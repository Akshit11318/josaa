name: Deploy to GitHub Pages

# Publishes the static site in docs/ (HTML/CSS/JS + the SQLite snapshot).
# In repo Settings → Pages, set Source = "GitHub Actions".

on:
  push:
    branches: ['**']   # deploy from ANY branch (last push wins on the single live site)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
