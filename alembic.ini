[alembic]
script_location = alembic
prepend_sys_path = .
# DATABASE_URL is injected at runtime in alembic/env.py; this is a harmless placeholder.
sqlalchemy.url = postgresql+psycopg2://josaa:josaa@localhost:5432/josaa

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
